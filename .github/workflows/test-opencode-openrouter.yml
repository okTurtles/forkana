name: Test opencode + OpenRouter

on:
  pull_request:
    paths:
      - '.github/workflows/test-opencode-openrouter.yml'

jobs:
  test-opencode:
    name: Verify opencode with stepfun/step-3.5-flash via OpenRouter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Check secret is set
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set"
            exit 1
          fi
          echo "OPENROUTER_API_KEY secret is available (length: ${#OPENROUTER_API_KEY})"

      - name: Install opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configure opencode for OpenRouter
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.json << 'EOF'
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "openrouter": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "OpenRouter",
                "options": {
                  "baseURL": "https://openrouter.ai/api/v1"
                },
                "models": {
                  "stepfun/step-3.5-flash": {
                    "name": "StepFun Step 3.5 Flash"
                  }
                }
              }
            }
          }
          EOF

          mkdir -p ~/.local/share/opencode
          jq -n --arg key "$OPENROUTER_API_KEY" \
            '{ openrouter: { type: "api", key: $key } }' \
            > ~/.local/share/opencode/auth.json

          echo "Config written:"
          cat ~/.config/opencode/opencode.json
          echo "Auth configured for openrouter provider"

      - name: Test opencode with custom provider config
        run: |
          echo "Reply with exactly: OPENCODE_TEST_OK" | opencode run -m "openrouter/stepfun/step-3.5-flash" > /tmp/oc_out.txt 2>/tmp/oc_err.txt
          EXIT_CODE=$?

          echo "=== opencode exit code: $EXIT_CODE ==="
          echo "=== stdout ==="
          cat /tmp/oc_out.txt
          echo "=== stderr ==="
          cat /tmp/oc_err.txt

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::opencode exited with code $EXIT_CODE"
            exit 1
          fi

          if [ ! -s /tmp/oc_out.txt ]; then
            echo "::error::opencode produced no output"
            exit 1
          fi

          echo "opencode successfully produced output using openrouter/stepfun/step-3.5-flash"
