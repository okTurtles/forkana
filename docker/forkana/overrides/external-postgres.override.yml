services:
  # Do not start the bundled postgres unless explicitly requested.
  postgres:
    profiles:
      - local-db

  forkana:
    # Remove the hard dependency on the bundled postgres service.
    depends_on:
      registry:
        condition: service_started

    environment:
      # Point Forkana at an existing Postgres instance.
      GITEA__database__DB_TYPE: ${FORKANA_DB_TYPE:-postgres}
      GITEA__database__HOST: ${FORKANA_DB_HOST:-host.docker.internal:5432}
      GITEA__database__NAME: ${FORKANA_DB_NAME:-forkana}
      GITEA__database__USER: ${FORKANA_DB_USER:-forkana}
      GITEA__database__PASSWD: ${FORKANA_DB_PASSWORD}
      GITEA__database__SSL_MODE: ${FORKANA_DB_SSL_MODE:-disable}

    # Allows connecting to a Postgres instance running on the Docker host.
    # For remote DB servers, set FORKANA_DB_HOST to that address instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
