name: forkana

# Docker-native log rotation defaults shared by all services.
# Note: Docker supports size-based rotation (not daily time-based rotation).
# Keep json-file as the safe default; use overrides/logging.override.yml for other drivers.
x-logging-defaults: &logging-defaults
  driver: json-file
  options:
    # Approximate logrotate's "rotate 14" retention.
    max-file: "${DOCKER_LOG_MAX_FILE:-14}"
    # Size-based trigger (Docker does not support time-based daily rotation).
    max-size: "${DOCKER_LOG_MAX_SIZE:-50m}"
    # Compress rotated files (equivalent to logrotate's `compress`).
    compress: "true"

services:
  registry:
    # Pinned by manifest digest so the tag can never be swapped.
    image: registry:3.0.0@sha256:6c5666b861f3505b116bb9aa9b25175e71210414bd010d92035ff64018f9457e
    container_name: registry
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REGISTRY_PORT:-5000}:5000"
    environment:
      # Registry 3.0.0 enables OpenTelemetry tracing by default and tries to
      # export to localhost:4318.  Disable it since we don't run a collector.
      OTEL_TRACES_EXPORTER: none
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/v2/"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - forkana-network
    logging: *logging-defaults

  postgres:
    image: postgres:14-alpine
    container_name: forkana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forkana
      POSTGRES_USER: forkana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${HOME}/forkana/postgres:/var/lib/postgresql/data
    networks:
      - forkana-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forkana -d forkana"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *logging-defaults

  forkana:
    # Human-friendly default; deploy.sh generates compose.override.yml to pin
    # the exact digest built from each commit.
    image: localhost:5000/forkana:latest
    container_name: forkana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      registry:
        condition: service_started
    ports:
      - "127.0.0.1:${FORKANA_HOST_PORT:-3000}:3000"
    environment:
      # Plain vars consumed only by envsubst on first-boot template generation.
      APP_NAME: "Forkana"
      RUN_MODE: prod

      # GITEA__-prefixed vars are applied by environment-to-ini on every
      # container startup, ensuring changes always take effect.

      # Server
      GITEA__server__DOMAIN: ${FORKANA_DOMAIN}
      GITEA__server__ROOT_URL: https://${FORKANA_DOMAIN}/
      GITEA__server__DISABLE_SSH: "true"

      # Database
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: forkana
      GITEA__database__USER: forkana
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__database__SSL_MODE: disable

      # Service
      GITEA__service__DISABLE_REGISTRATION: "true"

      # Security
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: ${FORKANA_SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${FORKANA_INTERNAL_TOKEN}
      # Trusted reverse-proxy CIDRs.  Keep this list in sync with the subnet
      # pinned below under networks.forkana-network.ipam.config.subnet.
      GITEA__security__REVERSE_PROXY_TRUSTED_PROXIES: "127.0.0.0/8,::1/128,172.30.0.0/16"
      GITEA__oauth2__JWT_SECRET: ${FORKANA_JWT_SECRET}
    volumes:
      - ${HOME}/forkana/data:/var/lib/gitea
      - ${HOME}/forkana/config:/etc/gitea
    networks:
      - forkana-network
    logging: *logging-defaults

volumes:
  registry-data:

networks:
  forkana-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
